services:

  # Postgresql
  postgres:
    image: postgres:15
    container_name: ecommerce_oltp
    restart: unless-stopped
    environment:
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: depass
      POSTGRES_DB: ecommerce_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./phase_1_modeling/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deuser -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5


# pg_admin - visual db
  pgadmin:
    image: dpage/pgadmin4
    container_name: ecommerce_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
      

